<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>メール折り返し（E2E フィクスチャ）</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f6f8; color: #222; }
    header { background: #2b4a6f; color: #fff; padding: 12px 24px; }
    header h1 { font-size: 18px; margin: 0; }
    main { padding: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card { background: #fff; border: 1px solid #d0d5da; border-radius: 6px; padding: 12px; width: 160px; }
    .card .name { font-weight: bold; margin-bottom: 4px; }
    .card .email { font-size: 13px; color: #555; word-break: break-all; }
    table { border-collapse: collapse; background: #fff; width: 320px; font-size: 14px; margin-top: 24px; }
    th, td { border: 1px solid #d0d5da; padding: 8px; text-align: left; word-break: break-all; }
    th { background: #e8ecf1; width: 80px; }
  </style>
</head>
<body>
  <!-- すべて架空のダミーデータ -->
  <header><h1>メール折り返しパターン検証</h1></header>
  <main>
    <!-- 狭いカード幅でメールアドレスが視覚的に複数行へ折り返される -->
    <div class="card">
      <div class="name" data-check="mask">田中健一</div>
      <div class="email" data-check="mask">kenichi.tanaka.longname@example-corp.co.jp</div>
    </div>
    <div class="card">
      <div class="name" data-check="mask">中村optional</div>
      <div class="email" data-check="mask">n@ab.co</div>
    </div>
    <div class="card">
      <div class="name" data-check="mask">小林さゆり</div>
      <div class="email" data-check="mask">sayuri_kobayashi+work@mail.example.io</div>
    </div>
  </main>
  <table>
    <tr><th data-check="keep">担当者</th><td data-check="mask">渡辺</td></tr>
    <tr><th data-check="keep">連絡先</th><td data-check="mask">watanabe.contact.address@subdomain.example.org</td></tr>
    <tr><th data-check="keep">予備</th><td data-check="mask">x@y.jp</td></tr>
  </table>
</body>
</html>
