<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>業務管理コンソール（DOM 経路 E2E フィクスチャ）</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f6f8; color: #222; display: grid; grid-template-columns: 200px 1fr; grid-template-rows: 52px 1fr; height: 100vh; }
    header { grid-column: 1 / 3; background: #1f3a5f; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    header h1 { font-size: 16px; margin: 0; }
    .sidebar { background: #263445; color: #cfd8e3; padding: 16px 0; }
    .sidebar a { display: block; color: inherit; text-decoration: none; padding: 9px 20px; font-size: 14px; }
    .sidebar a.active { background: #3b5273; color: #fff; }
    main { padding: 20px 24px; overflow: auto; }
    .breadcrumb { font-size: 12px; color: #667; margin-bottom: 12px; }
    .breadcrumb a { color: #667; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tabs button { border: 1px solid #c6ccd4; background: #eef1f4; padding: 8px 18px; font-size: 13px; border-radius: 4px 4px 0 0; }
    .tabs button[aria-selected="true"] { background: #fff; border-bottom-color: #fff; }
    form.filters { display: flex; gap: 16px; align-items: end; background: #fff; border: 1px solid #d0d5da; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; }
    form.filters label { display: block; margin-bottom: 4px; color: #445; }
    form.filters input, form.filters select { font-size: 13px; padding: 6px 8px; border: 1px solid #c6ccd4; border-radius: 3px; }
    form.filters button { padding: 7px 18px; }
    table { border-collapse: collapse; background: #fff; width: 100%; font-size: 13px; }
    th, td { border: 1px solid #d0d5da; padding: 9px 12px; text-align: left; }
    th { background: #e8ecf1; }
  </style>
</head>
<body>
  <!-- すべて架空のダミーデータ。想定ユースの代表形（社内 Web アプリの管理画面）を模し、
       「残るべき UI 骨格」（ナビ・タブ・パンくず・見出し・フォームラベル）に keep 期待を
       濃く張った過剰マスク検出用フィクスチャ。DOM 経路（dom-extractor.js）専用 -->
  <header>
    <h1 data-check="keep">業務管理コンソール</h1>
    <!-- header 直下（nav 外）のユーザー名は従来どおり塗られるべき -->
    <span>ログイン中: <span data-check="mask">結城蓮司</span></span>
  </header>
  <nav class="sidebar">
    <!-- 辞書（UI_LABEL_ALLOWLIST）に無い機能名・カタカナ語。nav のラベル化が
         無いと未知語/長語として塗られる（= このフィクスチャが検出する回帰） -->
    <a href="#" data-check="keep">ダッシュボード</a>
    <a href="#" class="active" data-check="keep">ワークフロー申請</a>
    <a href="#" data-check="keep">在庫アラート</a>
    <a href="#" data-check="keep">監査ログ</a>
    <a href="#" data-check="keep">権限テンプレート</a>
  </nav>
  <main>
    <nav class="breadcrumb" aria-label="パンくず">
      <a href="#" data-check="keep">ホーム</a> / <span data-check="keep">ワークフロー申請</span>
    </nav>
    <div class="tabs" role="tablist">
      <button role="tab" aria-selected="true" data-check="keep">未対応</button>
      <button role="tab" aria-selected="false" data-check="keep">対応中</button>
      <button role="tab" aria-selected="false" data-check="keep">完了アーカイブ</button>
    </div>
    <form class="filters">
      <div>
        <label for="f-assignee" data-check="keep">担当者</label>
        <input id="f-assignee" data-check="mask" value="桐生美月" size="12">
      </div>
      <div>
        <label for="f-dept" data-check="keep">申請部門</label>
        <select id="f-dept" data-check="mask">
          <option selected>第二営業部</option>
        </select>
      </div>
      <div>
        <label for="f-apikey" data-check="keep">接続キー</label>
        <!-- password の値は画面上 ●●● でしか見えない。矩形は塗られるべきだが、
             生の値（KAgi-9973-himitsu）が抽出結果に載ってはならない
             （E2E 側で payload に含まれないことも検証する） -->
        <input id="f-apikey" type="password" data-check="mask" value="KAgi-9973-himitsu" size="12">
      </div>
      <button type="button" data-check="keep">絞り込み</button>
    </form>
    <table>
      <tr>
        <th data-check="keep">申請番号</th>
        <th data-check="keep">申請者</th>
        <th data-check="keep">連絡先メール</th>
        <th data-check="keep">承認ステータス</th>
      </tr>
      <tr>
        <td data-check="mask">WF-2026-0713</td>
        <td data-check="mask">葛西統真</td>
        <td data-check="mask">toma.kasai@example.co.jp</td>
        <!-- UI ラベル語彙と同じ文字列でも td 内ならデータとして塗る（確定事項11） -->
        <td data-check="mask">保存</td>
      </tr>
      <tr>
        <td data-check="mask">WF-2026-0698</td>
        <td data-check="mask">氷室千夏</td>
        <td data-check="mask">c.himuro@example.net</td>
        <td data-check="mask">差戻し</td>
      </tr>
    </table>
  </main>
</body>
</html>
