<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>電話・郵便番号の表記ゆれ（E2E フィクスチャ）</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f6f8; color: #222; }
    header { background: #2b4a6f; color: #fff; padding: 12px 24px; }
    header h1 { font-size: 18px; margin: 0; }
    main { padding: 24px; }
    table { border-collapse: collapse; background: #fff; width: 100%; font-size: 14px; }
    th, td { border: 1px solid #d0d5da; padding: 10px 14px; text-align: left; }
    th { background: #e8ecf1; width: 160px; }
  </style>
</head>
<body>
  <!-- すべて架空のダミーデータ -->
  <header><h1 data-check="keep">電話・郵便番号 表記ゆれ検証</h1></header>
  <main>
    <table>
      <tr><th>ハイフン区切り</th><td data-check="mask">090-1234-5678</td></tr>
      <tr><th>スペース区切り</th><td data-check="mask">090 1234 5678</td></tr>
      <tr><th>市外局番かっこ</th><td data-check="mask">(03)1234-5678</td></tr>
      <tr><th>国番号付き</th><td data-check="mask">+81-90-1234-5678</td></tr>
      <tr><th>全角数字</th><td data-check="mask">０９０－１２３４－５６７８</td></tr>
      <!-- 「内線」はラベル語（辞書に載る一般語）なので残ってよい。
           数字部分と区切り文字が塗られることだけを span 単位で検証する -->
      <tr><th>内線付き</th><td><span data-check="mask">03-1234-5678</span> (内線 <span data-check="mask">210</span>)</td></tr>
      <tr><th>郵便番号（半角）</th><td data-check="mask">〒150-0001</td></tr>
      <tr><th>郵便番号（全角）</th><td data-check="mask">〒１５０ー０００１</td></tr>
      <tr><th>フリーダイヤル</th><td data-check="mask">0120-123-456</td></tr>
      <!-- "FAX" はアローリスト登録済みラベルなので残るのが正しい -->
      <tr><th data-check="keep">FAX表記</th><td><span data-check="keep">FAX</span>: <span data-check="mask">03-9876-5432</span></td></tr>
      <!-- 区切り文字の前後にスペースを広く挟んだ形。区切りトークン（-）が
           塗り漏れた場合、マスク矩形の padding では隙間が埋まらず輝度判定で
           検出できる（Issue #1 の行結合 digit-run 判定の red-green 用） -->
      <tr><th>スペース＋ハイフン</th><td data-check="mask">090&nbsp;&nbsp;-&nbsp;&nbsp;1234&nbsp;&nbsp;-&nbsp;&nbsp;5678</td></tr>
    </table>
  </main>
</body>
</html>
