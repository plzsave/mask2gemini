<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>顧客管理システム（E2E フィクスチャ）</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f6f8; color: #222; }
    header { background: #2b4a6f; color: #fff; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; margin: 0; }
    main { padding: 24px; }
    .actions { margin-bottom: 16px; }
    button { font-size: 14px; padding: 8px 20px; margin-right: 8px; border: 1px solid #2b4a6f; background: #fff; color: #2b4a6f; border-radius: 4px; }
    button.primary { background: #2b4a6f; color: #fff; }
    table { border-collapse: collapse; background: #fff; width: 100%; font-size: 14px; }
    th, td { border: 1px solid #d0d5da; padding: 10px 14px; text-align: left; }
    th { background: #e8ecf1; }
  </style>
</head>
<body>
  <!-- すべて架空のダミーデータ -->
  <header>
    <h1 data-check="keep">顧客管理システム</h1>
    <span>株式会社ABC ／ ログイン中: <span data-check="mask">佐藤花子</span></span>
  </header>
  <main>
    <div class="actions">
      <button class="primary" data-check="keep">検索</button>
      <button data-check="keep">新規登録</button>
      <button data-check="keep">保存</button>
      <button data-check="keep">削除</button>
    </div>
    <table>
      <tr><th data-check="keep">氏名</th><th data-check="keep">メールアドレス</th><th data-check="keep">電話番号</th><th data-check="keep">住所</th><th data-check="keep">契約金額</th></tr>
      <tr><td data-check="mask">山田太郎</td><td data-check="mask">taro.yamada@example.com</td><td data-check="mask">090-1234-5678</td><td data-check="mask">東京都新宿区西新宿2-8-1</td><td data-check="mask">¥120,000</td></tr>
      <tr><td data-check="mask">鈴木一郎</td><td data-check="mask">ichiro.suzuki@example.co.jp</td><td data-check="mask">080-9876-5432</td><td data-check="mask">大阪府大阪市北区梅田3-1-3</td><td data-check="mask">¥85,500</td></tr>
      <tr><td data-check="mask">高橋美咲</td><td data-check="mask">misaki.t@example.net</td><td data-check="mask">070-1111-2222</td><td data-check="mask">福岡県福岡市博多区博多駅前1-1</td><td data-check="mask">¥240,000</td></tr>
    </table>
  </main>
</body>
</html>
