<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>mask2gemini — マスク確認</title>
  <link rel="stylesheet" href="review.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <strong>mask2gemini</strong>
      <span id="status" aria-live="polite">読み込み中…</span>
      <span id="register-zone"></span>
    </div>
    <div class="toolbar-right">
      <!-- 主導線（①→②→③）。実行済みは .done、次にやる操作は .next で強調する（Issue #29）。
           順序は実際の利用順: 画像コピー → Gemini で貼り付け → 戻ってプロンプトをコピーして貼り付け。
           ②と③の間で Gemini へ画像を貼るため、クリップボードは 1 段ずつしか使わない -->
      <div class="steps">
        <button id="copy-image" class="step" disabled>① マスク済み画像をコピー</button>
        <span class="step-arrow" aria-hidden="true">→</span>
        <button id="open-gemini" class="step" disabled>② Gemini を開いて貼り付け</button>
        <span class="step-arrow" aria-hidden="true">→</span>
        <button id="copy-prompt" class="step" disabled>③ プロンプトをコピー</button>
      </div>
      <span class="toolbar-sep" aria-hidden="true"></span>
      <button id="save-wireframe" hidden disabled>ワイヤーフレームを保存 (.excalidraw)</button>
      <button id="open-options" class="ghost" title="ホワイトリスト設定">設定</button>
    </div>
  </header>
  <p class="hint">
    <span>クリック: 黒塗りを解除</span>
    <span>ドラッグ: 黒塗りを追加</span>
    <span>Shift+ドラッグ: 範囲内を一括解除</span>
    <span>Alt+クリック: 同じ列を一括解除</span>
  </p>
  <main class="stage">
    <!-- エンジニア向け。設定でデバッグ表示を有効にしたときだけ現れる（Issue #29） -->
    <div class="debug-bar" id="debug-bar" hidden>
      <label class="debug-toggle-label">
        <input type="checkbox" id="debug-toggle">
        デバッグ表示（判定reasonを枠色で表示）
      </label>
      <button id="copy-decisions" class="debug-only" hidden>判定ログをコピー</button>
      <div id="debug-legend" class="debug-legend"></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <canvas id="debug-overlay"></canvas>
    </div>
  </main>
  <script src="vendor/tesseract/tesseract.min.js"></script>
  <script src="vendor/kuromoji/kuromoji.js"></script>
  <script src="rules.js"></script>
  <script src="allowlist.js"></script>
  <script src="mask-decider.js"></script>
  <script src="wireframe-exporter.js"></script>
  <script src="review.js"></script>
</body>
</html>
