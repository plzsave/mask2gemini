# PR / main push で単体テストと E2E（実ブラウザに拡張を読み込む Playwright）を回す。
# ローカルの LLM 駆動リリース運用（CLAUDE.md）の前段となる機械チェック層。
# uses: はコミット SHA でピンし、更新は Dependabot（.github/dependabot.yml）に任せる
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension vendor assets
        # ネットワークアクセスなし（すべて node_modules からコピー）
        run: bash scripts/copy-vendor.sh

      - name: Unit tests
        run: bun run test

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: E2E tests (extension + real OCR/DOM extraction)
        run: bun run test:e2e
